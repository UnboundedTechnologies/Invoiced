version: 2

# Single-user free-tier project — security updates only. We do not want
# weekly version-bump PRs for non-security changes; major upgrades are
# scheduled manually with deliberate testing (see commit history for the
# Next 16 / React 19 / Tailwind 4 / Zod 4 / TypeScript 6 cadence).

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Toronto
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Only patch + minor for security advisories. Major bumps stay manual.
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
