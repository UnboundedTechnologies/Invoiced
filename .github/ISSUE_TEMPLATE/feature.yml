name: Feature request
description: Suggest an improvement or a new capability
title: "[feat] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point or gap motivates this request?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you like it solved? Sketches / API ideas welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you discarded them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, references.
